<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOE — Parked</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0c10; --surface: #111318; --surface2: #181c24;
    --border: rgba(255,255,255,0.07); --text: #e8eaf0; --muted: #5a6070;
    --accent: #00d4ff; --accent2: #7b61ff; --danger: #ff4757; --warn: #ffa502;
    --mono: 'JetBrains Mono', monospace; --sans: 'Space Grotesk', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; max-width: 460px; margin: 0 auto; display: flex; flex-direction: column; position: relative; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  header { padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; background: rgba(10,12,16,0.95); backdrop-filter: blur(12px); }
  .logo { font-family: var(--mono); font-size: 12px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; }
  .logo span { color: var(--accent2); }
  .back-btn { font-family: var(--mono); font-size: 11px; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.15s; }
  .back-btn:hover { color: var(--accent); }
  .back-btn svg { width: 14px; height: 14px; }
  .status-pill { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; border: 1px solid; display: flex; align-items: center; gap: 6px; transition: all 0.3s; }
  .status-pill.secure { border-color: rgba(0,212,255,0.3); color: var(--accent); background: rgba(0,212,255,0.06); }
  .status-pill.alert  { border-color: rgba(255,165,2,0.4);  color: var(--warn);   background: rgba(255,165,2,0.08); }
  .status-pill.theft  { border-color: rgba(255,71,87,0.4);  color: var(--danger); background: rgba(255,71,87,0.08); }
  .pulse { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  main { flex: 1; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; position: relative; z-index: 10; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: border-color 0.3s; }
  .card.danger-active { border-color: rgba(255,71,87,0.3); }
  .card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
  .live-tag { font-family: var(--mono); font-size: 9px; color: var(--accent); display: flex; align-items: center; gap: 5px; }
  .live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: pulse 1s ease-in-out infinite; }
  .status-hero { padding: 20px 18px; display: flex; align-items: center; gap: 18px; }
  .status-ring { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid; flex-shrink: 0; transition: all 0.3s; }
  .status-ring.secure { border-color: var(--accent);  background: rgba(0,212,255,0.06); }
  .status-ring.alert  { border-color: var(--warn);    background: rgba(255,165,2,0.08); }
  .status-ring.theft  { border-color: var(--danger);  background: rgba(255,71,87,0.08); animation: danger-pulse 1s ease-in-out infinite; }
  @keyframes danger-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,71,87,0.3)} 50%{box-shadow:0 0 0 10px rgba(255,71,87,0)} }
  .status-ring svg { width: 24px; height: 24px; }
  .status-ring.secure svg { stroke: var(--accent); }
  .status-ring.alert  svg { stroke: var(--warn); }
  .status-ring.theft  svg { stroke: var(--danger); }
  .status-label { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .status-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .data-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 18px; border-bottom: 1px solid var(--border); }
  .data-row:last-child { border-bottom: none; }
  .data-name { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .data-val { font-family: var(--mono); font-size: 12px; }
  .data-val.ok      { color: var(--accent); }
  .data-val.warn    { color: var(--warn); }
  .data-val.danger  { color: var(--danger); }
  .data-val.neutral { color: var(--text); }
  .data-val.offline { color: var(--muted); }
  .alert-list { display: flex; flex-direction: column; gap: 8px; padding: 14px 18px; }
  .alert-item { border-radius: 8px; padding: 10px 14px; border: 1px solid; }
  .alert-item.theft { border-color: rgba(255,71,87,0.3); background: rgba(255,71,87,0.06); }
  .alert-item.warn  { border-color: rgba(255,165,2,0.3); background: rgba(255,165,2,0.06); }
  .alert-item.info  { border-color: rgba(0,212,255,0.2); background: rgba(0,212,255,0.04); }
  .alert-msg  { font-size: 12px; font-weight: 500; margin-bottom: 3px; }
  .alert-meta { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .no-alerts { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: center; padding: 16px 18px; }
  .source-badge { font-family: var(--mono); font-size: 10px; text-align: center; padding: 8px; border-radius: 8px; border: 1px solid var(--border); }
  .source-badge.live { color: var(--accent); border-color: rgba(0,212,255,0.2); background: rgba(0,212,255,0.04); }
  .source-badge.sim  { color: var(--warn);   border-color: rgba(255,165,2,0.2);  background: rgba(255,165,2,0.04); }
</style>
</head>
<body>
<header>
  <a href="/" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
    Back
  </a>
  <div class="logo">ZOE <span>Sec</span></div>
  <div class="status-pill secure" id="statusPill">
    <div class="pulse"></div>
    <span id="pillText">Secure</span>
  </div>
</header>

<main>

  <!-- Global status -->
  <div class="card" id="statusCard">
    <div class="status-hero">
      <div class="status-ring secure" id="statusRing">
        <svg fill="none" stroke-width="1.5" id="statusIcon" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div>
        <div class="status-label" id="statusLabel">Bike secured</div>
        <div class="status-sub">Last update: <span id="lastUpdate">—</span></div>
      </div>
    </div>
  </div>

  <!-- Coral Face Recognition -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Face Recognition — Coral</span>
      <div class="live-tag"><div class="live-dot"></div> ML</div>
    </div>
    <div class="data-row"><span class="data-name">Auth status</span><span class="data-val offline" id="mlStatus">Idle</span></div>
    <div class="data-row"><span class="data-name">User</span><span class="data-val neutral" id="mlUser">—</span></div>
    <div class="data-row"><span class="data-name">Model</span><span class="data-val ok">ONNX · webface_r50</span></div>
  </div>

  <!-- Pytrack alerts -->
  <div class="card" id="alertCard">
    <div class="card-header">
      <span class="card-title">Pytrack alerts</span>
      <span class="data-val neutral" id="alertCount" style="font-size:10px">0 events</span>
    </div>
    <div id="alertList"><div class="no-alerts">No alerts — bike is secure</div></div>
  </div>

  <div class="source-badge sim" id="sourceBadge">Simulated data — device not connected</div>

</main>

<script>
  let alerts = [];

  async function fetchML() {
    try {
      const res = await fetch('/api/ml');
      const d = await res.json();
      updateML(d);
    } catch(e) {}
  }

  async function fetchAlerts() {
    try {
      const res = await fetch('/api/alerts');
      const data = await res.json();
      if (data.length) {
        alerts = data;
        renderAlerts();
        // Set status based on most recent alert
        const latest = data[0];
        if (latest.event_type === 'theft_alert') setStatus('theft');
        else if (latest.event_type === 'crash_alert') setStatus('alert');
      }
    } catch(e) {}
  }

  async function fetchLatest() {
    try {
      const res = await fetch('/api/latest');
      const d = await res.json();
      const now = new Date();
      document.getElementById('lastUpdate').textContent =
        now.getHours().toString().padStart(2,'0') + ':' +
        now.getMinutes().toString().padStart(2,'0') + ':' +
        now.getSeconds().toString().padStart(2,'0');
      const badge = document.getElementById('sourceBadge');
      if (d.simulated) {
        badge.textContent = 'Simulated data — device not connected';
        badge.className = 'source-badge sim';
      } else {
        badge.textContent = 'Live data from CosmosDB';
        badge.className = 'source-badge live';
      }
    } catch(e) {}
  }

  function updateML(d) {
    const status = d.ml_status || 'idle';
    const statusEl = document.getElementById('mlStatus');
    const userEl   = document.getElementById('mlUser');

    if (status === 'authorized') {
      statusEl.textContent = 'Authorized';
      statusEl.className = 'data-val ok';
      userEl.textContent = d.user || 'Known user';
      userEl.className = 'data-val ok';
      if (document.getElementById('statusPill').classList.contains('theft')) return;
      setStatus('secure');
    } else if (status === 'unauthorized') {
      statusEl.textContent = 'Unauthorized';
      statusEl.className = 'data-val danger';
      userEl.textContent = 'Unknown person';
      userEl.className = 'data-val danger';
      setStatus('theft');
    } else {
      statusEl.textContent = status.charAt(0).toUpperCase() + status.slice(1);
      statusEl.className = 'data-val offline';
      confEl.textContent = '—';
      userEl.textContent = '—';
      userEl.className = 'data-val neutral';
    }
  }

  function setStatus(s) {
    const pill  = document.getElementById('statusPill');
    const ring  = document.getElementById('statusRing');
    const label = document.getElementById('statusLabel');
    const icon  = document.getElementById('statusIcon');

    pill.className  = 'status-pill ' + s;
    ring.className  = 'status-ring ' + s;

    const pillTextMap = { secure: 'Secure', alert: 'Alert', theft: 'Theft' };
    document.getElementById('pillText').textContent = pillTextMap[s] || s;

    if (s === 'secure') {
      label.textContent = 'Bike secured';
      icon.innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>';
    } else if (s === 'alert') {
      label.textContent = 'Movement detected';
      icon.innerHTML = '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>';
    } else if (s === 'theft') {
      label.textContent = 'Possible theft';
      icon.innerHTML = '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
    }
  }

  function renderAlerts() {
    const list = document.getElementById('alertList');
    document.getElementById('alertCount').textContent = alerts.length + ' event' + (alerts.length !== 1 ? 's' : '');
    if (!alerts.length) {
      list.innerHTML = '<div class="no-alerts">No alerts — bike is secure</div>';
      return;
    }
    list.innerHTML = '<div class="alert-list">' + alerts.map(a => {
      const cls = a.event_type === 'theft_alert' ? 'theft' : 'warn';
      const label = a.event_type === 'theft_alert' ? 'Theft alert' : 'Movement alert';
      const gps = (a.lat && a.lon) ? ` · ${parseFloat(a.lat).toFixed(4)}, ${parseFloat(a.lon).toFixed(4)}` : '';
      return `<div class="alert-item ${cls}">
        <div class="alert-msg">${label} — bike ${a.bike_id || '—'}</div>
        <div class="alert-meta">${a.timestamp || '—'}${gps}</div>
      </div>`;
    }).join('') + '</div>';
  }

  fetchLatest(); fetchML(); fetchAlerts();
  setInterval(fetchLatest, 3000);
  setInterval(fetchML, 5000);
  setInterval(fetchAlerts, 5000);
</script>
</body>
</html>
