<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeloGuard — Parked</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --border: #e2e0d8;
    --text: #1a1a18; --muted: #7a7870; --accent: #1a6b3c;
    --accent-light: #e8f3ed; --warn: #b45309; --warn-light: #fef3c7;
    --danger: #b91c1c; --danger-light: #fee2e2;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; max-width: 420px; margin: 0 auto; display: flex; flex-direction: column; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  .logo { font-size: 18px; font-weight: 600; }
  .logo span { color: var(--accent); }
  .back-btn { font-family: var(--mono); font-size: 11px; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 4px; }
  .back-btn:hover { color: var(--accent); }
  .system-badge { font-family: var(--mono); font-size: 10px; padding: 4px 10px; border-radius: 20px; border: 1px solid; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 5px; transition: all 0.3s; }
  .system-badge.safe { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .system-badge.alert { border-color: var(--warn); color: var(--warn); background: var(--warn-light); }
  .system-badge.danger { border-color: var(--danger); color: var(--danger); background: var(--danger-light); }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  main { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-family: var(--mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .status-big { padding: 20px 16px; display: flex; align-items: center; gap: 16px; }
  .status-icon { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; transition: background 0.3s; }
  .status-icon.safe { background: var(--accent-light); }
  .status-icon.alert { background: var(--warn-light); }
  .status-icon.danger { background: var(--danger-light); }
  .status-label { font-size: 20px; font-weight: 600; margin-bottom: 2px; }
  .status-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .accel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .axis-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 10px; text-align: center; }
  .axis-label { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .axis-value { font-family: var(--mono); font-size: 22px; font-weight: 500; line-height: 1; transition: color 0.3s; }
  .axis-value.normal { color: var(--text); } .axis-value.warn { color: var(--warn); } .axis-value.danger { color: var(--danger); }
  .axis-unit { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }
  .threshold-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .threshold-row:last-child { border-bottom: none; }
  .threshold-name { color: var(--muted); font-family: var(--mono); font-size: 11px; }
  .threshold-val { font-family: var(--mono); font-size: 12px; font-weight: 500; }
  .alert-list { display: flex; flex-direction: column; gap: 8px; }
  .alert-item { border-radius: 8px; padding: 10px 12px; border: 1px solid; display: flex; align-items: flex-start; gap: 10px; }
  .alert-item.high { border-color: #fca5a5; background: var(--danger-light); }
  .alert-item.medium { border-color: #fcd34d; background: var(--warn-light); }
  .alert-item.info { border-color: #93c5fd; background: #eff6ff; }
  .alert-msg { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .alert-time { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn { padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; }
  .btn:hover { background: var(--bg); }
  .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn.primary:hover { background: #155c32; }
  .btn.danger-btn { background: var(--danger); color: white; border-color: var(--danger); }
  .bar-wrap { display: flex; align-items: flex-end; gap: 3px; height: 60px; margin-top: 12px; padding: 0 4px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .bar { width: 100%; border-radius: 3px 3px 0 0; transition: height 0.4s ease; min-height: 2px; }
  .bar.x { background: #1a6b3c; } .bar.y { background: #2563eb; } .bar.z { background: #7c3aed; }
  .bar-tick { font-family: var(--mono); font-size: 8px; color: var(--muted); white-space: nowrap; }
  .bar-legend { display: flex; gap: 12px; margin-top: 8px; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  .live-indicator { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: blink 1s ease-in-out infinite; }
</style>
</head>
<body>
<header>
  <a href="/" class="back-btn">‹ Back</a>
  <div class="logo">Velo<span>Guard</span></div>
  <div class="system-badge safe" id="systemBadge">
    <div class="badge-dot"></div>
    <span id="badgeText">SECURE</span>
  </div>
</header>
<main>

  <!-- Status -->
  <div class="card">
    <div class="status-big">
      <div class="status-icon safe" id="statusIcon">🔒</div>
      <div>
        <div class="status-label" id="statusLabel">Bike secured</div>
        <div class="status-sub" id="statusSub">Monitoring active · last update <span id="lastUpdate">—</span></div>
      </div>
    </div>
  </div>

  <!-- Accelerometer -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Accelerometer</span>
      <div class="live-indicator"><div class="live-dot"></div> LIVE</div>
    </div>
    <div class="card-body">
      <div class="accel-grid">
        <div class="axis-card">
          <div class="axis-label">X axis</div>
          <div class="axis-value normal" id="valX">—</div>
          <div class="axis-unit">m/s²</div>
        </div>
        <div class="axis-card">
          <div class="axis-label">Y axis</div>
          <div class="axis-value normal" id="valY">—</div>
          <div class="axis-unit">m/s²</div>
        </div>
        <div class="axis-card">
          <div class="axis-label">Z axis</div>
          <div class="axis-value normal" id="valZ">—</div>
          <div class="axis-unit">m/s²</div>
        </div>
      </div>
      <div class="bar-wrap" id="barWrap"></div>
      <div class="bar-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#1a6b3c"></div> X</div>
        <div class="legend-item"><div class="legend-dot" style="background:#2563eb"></div> Y</div>
        <div class="legend-item"><div class="legend-dot" style="background:#7c3aed"></div> Z</div>
      </div>
    </div>
  </div>

  <!-- Thresholds -->
  <div class="card">
    <div class="card-header"><span class="card-title">Detection thresholds</span></div>
    <div class="threshold-row"><span class="threshold-name">Movement alert</span><span class="threshold-val">± 1.5 m/s²</span></div>
    <div class="threshold-row"><span class="threshold-name">Theft trigger</span><span class="threshold-val">± 3.0 m/s²</span></div>
    <div class="threshold-row"><span class="threshold-name">Sample rate</span><span class="threshold-val">1 Hz</span></div>
  </div>

  <!-- Alerts -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Recent alerts</span>
      <span style="font-family:var(--mono);font-size:10px;color:var(--muted)" id="alertCount">0 events</span>
    </div>
    <div class="card-body">
      <div class="alert-list" id="alertList">
        <div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;padding:12px 0">No alerts — bike is secure</div>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="action-row">
    <button class="btn" onclick="simulateAlert()">⚡ Simulate alert</button>
    <button class="btn primary" onclick="resetStatus()">🔒 Reset security</button>
  </div>

</main>

<script>
  const ALERT_THRESH = 1.5;
  const DANGER_THRESH = 3.0;
  let currentStatus = 'safe';
  let alerts = [];
  let history = [];
  const MAX_BARS = 12;

  async function fetchLatest() {
    try {
      const res = await fetch('/api/latest');
      const d = await res.json();
      updateUI(d);
      checkThresholds(d);
    } catch(e) {}
  }

  async function fetchHistory() {
    try {
      const res = await fetch('/api/history');
      const data = await res.json();
      history = data.slice(0, MAX_BARS).reverse();
      renderBars();
    } catch(e) {}
  }

  function updateUI(d) {
    const x = parseFloat(d.x) || 0;
    const y = parseFloat(d.y) || 0;
    const z = parseFloat(d.z) || 9.81;

    document.getElementById('valX').textContent = x.toFixed(2);
    document.getElementById('valY').textContent = y.toFixed(2);
    document.getElementById('valZ').textContent = z.toFixed(2);

    const now = new Date();
    document.getElementById('lastUpdate').textContent =
      now.getHours().toString().padStart(2,'0') + ':' +
      now.getMinutes().toString().padStart(2,'0') + ':' +
      now.getSeconds().toString().padStart(2,'0');

    ['X','Y'].forEach(axis => {
      const el = document.getElementById('val'+axis);
      const v = Math.abs(axis === 'X' ? x : y);
      el.className = 'axis-value ' + (v > DANGER_THRESH ? 'danger' : v > ALERT_THRESH ? 'warn' : 'normal');
    });
  }

  function checkThresholds(d) {
    const x = parseFloat(d.x) || 0;
    const y = parseFloat(d.y) || 0;
    const mag = Math.sqrt(x**2 + y**2);
    if (currentStatus === 'safe') {
      if (mag > DANGER_THRESH) setStatus('danger');
      else if (mag > ALERT_THRESH) setStatus('alert');
    }
  }

  function setStatus(s) {
    currentStatus = s;
    const badge = document.getElementById('systemBadge');
    const icon = document.getElementById('statusIcon');
    const label = document.getElementById('statusLabel');
    const sub = document.getElementById('statusSub');
    badge.className = 'system-badge ' + s;
    icon.className = 'status-icon ' + s;
    if (s === 'safe') {
      document.getElementById('badgeText').textContent = 'SECURE';
      icon.textContent = '🔒'; label.textContent = 'Bike secured';
      sub.innerHTML = 'Monitoring active · last update <span id="lastUpdate">—</span>';
    } else if (s === 'alert') {
      document.getElementById('badgeText').textContent = 'ALERT';
      icon.textContent = '⚠️'; label.textContent = 'Movement detected';
      sub.innerHTML = 'Camera analysis triggered · <span id="lastUpdate">—</span>';
      addAlert('⚠️ Movement detected on X/Y axis', 'medium');
    } else if (s === 'danger') {
      document.getElementById('badgeText').textContent = 'THEFT';
      icon.textContent = '🚨'; label.textContent = 'Possible theft!';
      sub.innerHTML = 'Owner notified · <span id="lastUpdate">—</span>';
      addAlert('🚨 Suspicious activity — possible theft', 'high');
    }
  }

  function addAlert(msg, level) {
    const now = new Date();
    const time = now.getHours().toString().padStart(2,'0') + ':' +
                 now.getMinutes().toString().padStart(2,'0') + ':' +
                 now.getSeconds().toString().padStart(2,'0');
    alerts.unshift({ msg, level, time });
    if (alerts.length > 10) alerts.pop();
    renderAlerts();
  }

  function renderAlerts() {
    const list = document.getElementById('alertList');
    document.getElementById('alertCount').textContent = alerts.length + ' event' + (alerts.length !== 1 ? 's' : '');
    if (alerts.length === 0) {
      list.innerHTML = '<div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;padding:12px 0">No alerts — bike is secure</div>';
      return;
    }
    list.innerHTML = alerts.map(a => `
      <div class="alert-item ${a.level}">
        <div>
          <div class="alert-msg">${a.msg}</div>
          <div class="alert-time">${a.time}</div>
        </div>
      </div>`).join('');
  }

  function simulateAlert() {
    setStatus('alert');
    setTimeout(() => { if (currentStatus === 'alert') setStatus('danger'); }, 3000);
  }

  function resetStatus() {
    currentStatus = 'safe';
    setStatus('safe');
    addAlert('✅ System reset — monitoring resumed', 'info');
  }

  function renderBars() {
    const wrap = document.getElementById('barWrap');
    wrap.innerHTML = '';
    history.forEach((d, i) => {
      const col = document.createElement('div');
      col.className = 'bar-col';
      ['x','y','z'].forEach(axis => {
        const bar = document.createElement('div');
        bar.className = 'bar ' + axis;
        const pct = Math.min(Math.abs(parseFloat(d[axis]) || 0) / 5, 1);
        bar.style.height = Math.max(pct * 52, 2) + 'px';
        col.appendChild(bar);
      });
      if (i === history.length - 1) {
        const tick = document.createElement('div');
        tick.className = 'bar-tick'; tick.textContent = 'now';
        col.appendChild(tick);
      }
      wrap.appendChild(col);
    });
  }

  fetchLatest();
  fetchHistory();
  setInterval(fetchLatest, 3000);
  setInterval(fetchHistory, 10000);
</script>
</body>
</html>
