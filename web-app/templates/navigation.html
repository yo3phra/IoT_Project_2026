<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeloGuard — Navigation</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --border: #e2e0d8;
    --text: #1a1a18; --muted: #7a7870; --accent: #1a6b3c;
    --accent-light: #e8f3ed; --warn: #b45309; --warn-light: #fef3c7;
    --danger: #b91c1c; --danger-light: #fee2e2;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; max-width: 420px; margin: 0 auto; display: flex; flex-direction: column; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  .logo { font-size: 18px; font-weight: 600; }
  .logo span { color: var(--accent); }
  .back-btn { font-family: var(--mono); font-size: 11px; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 4px; }
  .back-btn:hover { color: var(--accent); }
  .mode-badge { font-family: var(--mono); font-size: 10px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--accent); color: var(--accent); background: var(--accent-light); display: flex; align-items: center; gap: 5px; }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  main { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-family: var(--mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .card-body { padding: 16px; }
  .live-indicator { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: blink 1s ease-in-out infinite; }
  .accel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .axis-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 10px; text-align: center; }
  .axis-label { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .axis-value { font-family: var(--mono); font-size: 22px; font-weight: 500; line-height: 1; transition: color 0.3s; }
  .axis-value.normal { color: var(--text); }
  .axis-value.warn { color: var(--warn); }
  .axis-value.danger { color: var(--danger); }
  .axis-unit { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }
  .bar-wrap { display: flex; align-items: flex-end; gap: 3px; height: 60px; margin-top: 12px; padding: 0 4px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .bar { width: 100%; border-radius: 3px 3px 0 0; transition: height 0.4s ease, background 0.3s; min-height: 2px; }
  .bar.x { background: #1a6b3c; } .bar.y { background: #2563eb; } .bar.z { background: #7c3aed; }
  .bar-tick { font-family: var(--mono); font-size: 8px; color: var(--muted); white-space: nowrap; }
  .bar-legend { display: flex; gap: 12px; margin-top: 8px; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  .data-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .data-row:last-child { border-bottom: none; }
  .data-name { color: var(--muted); font-family: var(--mono); font-size: 11px; }
  .data-val { font-family: var(--mono); font-size: 12px; font-weight: 500; }
  .map-placeholder { background: #e8ede8; border-radius: 8px; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--muted); font-family: var(--mono); font-size: 12px; border: 1px dashed var(--border); position: relative; overflow: hidden; }
  .map-grid-lines { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px); background-size: 30px 30px; }
  .map-pin { font-size: 28px; z-index: 2; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); animation: pin-bounce 2s ease-in-out infinite; }
  @keyframes pin-bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  .map-coords { z-index: 2; background: white; padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); }
  .data-source { font-family: var(--mono); font-size: 10px; color: var(--muted); text-align: center; padding: 8px; }
  .data-source.simulated { color: var(--warn); }
</style>
</head>
<body>
<header>
  <a href="/" class="back-btn">‹ Back</a>
  <div class="logo">Velo<span>Guard</span></div>
  <div class="mode-badge"><div class="badge-dot"></div> RIDING</div>
</header>
<main>

  <!-- Accelerometer -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Accelerometer</span>
      <div class="live-indicator"><div class="live-dot"></div> LIVE</div>
    </div>
    <div class="card-body">
      <div class="accel-grid">
        <div class="axis-card">
          <div class="axis-label">X axis</div>
          <div class="axis-value normal" id="valX">—</div>
          <div class="axis-unit">m/s²</div>
        </div>
        <div class="axis-card">
          <div class="axis-label">Y axis</div>
          <div class="axis-value normal" id="valY">—</div>
          <div class="axis-unit">m/s²</div>
        </div>
        <div class="axis-card">
          <div class="axis-label">Z axis</div>
          <div class="axis-value normal" id="valZ">—</div>
          <div class="axis-unit">m/s²</div>
        </div>
      </div>
      <div class="bar-wrap" id="barWrap"></div>
      <div class="bar-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#1a6b3c"></div> X</div>
        <div class="legend-item"><div class="legend-dot" style="background:#2563eb"></div> Y</div>
        <div class="legend-item"><div class="legend-dot" style="background:#7c3aed"></div> Z</div>
      </div>
    </div>
  </div>

  <!-- GPS -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">GPS Location</span>
      <div class="live-indicator"><div class="live-dot"></div> LIVE</div>
    </div>
    <div class="card-body">
      <div class="map-placeholder">
        <div class="map-grid-lines"></div>
        <div class="map-pin">📍</div>
        <div class="map-coords" id="gpsCoords">Waiting for GPS...</div>
      </div>
      <div style="margin-top:12px;display:flex;flex-direction:column">
        <div class="data-row"><span class="data-name">Latitude</span><span class="data-val" id="gpsLat">—</span></div>
        <div class="data-row"><span class="data-name">Longitude</span><span class="data-val" id="gpsLon">—</span></div>
        <div class="data-row"><span class="data-name">Last update</span><span class="data-val" id="lastUpdate">—</span></div>
        <div class="data-row"><span class="data-name">Device</span><span class="data-val" id="deviceId">—</span></div>
      </div>
    </div>
  </div>

  <div class="data-source" id="dataSource">Loading data...</div>

</main>

<script>
  const ALERT_THRESH = 1.5;
  const DANGER_THRESH = 3.0;
  let history = [];
  const MAX_BARS = 12;

  async function fetchLatest() {
    try {
      const res = await fetch('/api/latest');
      const d = await res.json();
      updateUI(d);
    } catch(e) { console.error(e); }
  }

  async function fetchHistory() {
    try {
      const res = await fetch('/api/history');
      const data = await res.json();
      history = data.slice(0, MAX_BARS).reverse();
      renderBars();
    } catch(e) { console.error(e); }
  }

  function updateUI(d) {
    const x = parseFloat(d.x) || 0;
    const y = parseFloat(d.y) || 0;
    const z = parseFloat(d.z) || 9.81;

    document.getElementById('valX').textContent = x.toFixed(2);
    document.getElementById('valY').textContent = y.toFixed(2);
    document.getElementById('valZ').textContent = z.toFixed(2);

    ['X','Y'].forEach(axis => {
      const el = document.getElementById('val'+axis);
      const v = Math.abs(axis === 'X' ? x : y);
      el.className = 'axis-value ' + (v > DANGER_THRESH ? 'danger' : v > ALERT_THRESH ? 'warn' : 'normal');
    });

    document.getElementById('lastUpdate').textContent = d.timestamp || '—';
    document.getElementById('deviceId').textContent = d.device_id || 'pysense-01';

    const src = document.getElementById('dataSource');
    if (d.simulated) {
      src.textContent = '⚠ Simulated data — no device connected';
      src.className = 'data-source simulated';
    } else {
      src.textContent = '✓ Live data from CosmosDB';
      src.className = 'data-source';
    }
  }

  function renderBars() {
    const wrap = document.getElementById('barWrap');
    wrap.innerHTML = '';
    const MAX_VAL = 5;
    history.forEach((d, i) => {
      const col = document.createElement('div');
      col.className = 'bar-col';
      ['x','y','z'].forEach(axis => {
        const bar = document.createElement('div');
        bar.className = 'bar ' + axis;
        const pct = Math.min(Math.abs(parseFloat(d[axis]) || 0) / MAX_VAL, 1);
        bar.style.height = Math.max(pct * 52, 2) + 'px';
        col.appendChild(bar);
      });
      if (i === history.length - 1) {
        const tick = document.createElement('div');
        tick.className = 'bar-tick';
        tick.textContent = 'now';
        col.appendChild(tick);
      }
      wrap.appendChild(col);
    });
  }

  fetchLatest();
  fetchHistory();
  setInterval(fetchLatest, 3000);
  setInterval(fetchHistory, 10000);
</script>
</body>
</html>
