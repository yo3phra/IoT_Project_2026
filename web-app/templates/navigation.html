<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOE — Cruising</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0c10; --surface: #111318; --surface2: #181c24;
    --border: rgba(255,255,255,0.07); --text: #e8eaf0; --muted: #5a6070;
    --accent: #00d4ff; --accent2: #7b61ff; --danger: #ff4757; --warn: #ffa502;
    --mono: 'JetBrains Mono', monospace; --sans: 'Space Grotesk', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; max-width: 460px; margin: 0 auto; display: flex; flex-direction: column; position: relative; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }

  header { padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; background: rgba(10,12,16,0.95); backdrop-filter: blur(12px); }
  .logo { font-family: var(--mono); font-size: 12px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; }
  .logo span { color: var(--accent); }
  .back-btn { font-family: var(--mono); font-size: 11px; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.15s; }
  .back-btn:hover { color: var(--accent); }
  .back-btn svg { width: 14px; height: 14px; }
  .mode-pill { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(0,212,255,0.3); color: var(--accent); background: rgba(0,212,255,0.06); display: flex; align-items: center; gap: 6px; }
  .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  main { flex: 1; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; position: relative; z-index: 10; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
  .card-body { padding: 18px; }
  .live-tag { font-family: var(--mono); font-size: 9px; color: var(--accent); display: flex; align-items: center; gap: 5px; letter-spacing: 1px; }
  .live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: pulse 1s ease-in-out infinite; }

  /* Speed + stats grid */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 14px; }
  .stat-label { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; }
  .stat-value { font-family: var(--mono); font-size: 28px; font-weight: 500; line-height: 1; color: var(--text); transition: color 0.3s; }
  .stat-value.accent { color: var(--accent); }
  .stat-value.warn { color: var(--warn); }
  .stat-value.danger { color: var(--danger); }
  .stat-unit { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 4px; }

  /* Crash alert banner */
  .crash-banner { display: none; background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.4); border-radius: 10px; padding: 14px 18px; }
  .crash-banner.visible { display: flex; align-items: center; justify-content: space-between; }
  .crash-banner-text { font-family: var(--mono); font-size: 12px; color: var(--danger); font-weight: 500; }
  .crash-banner-time { font-family: var(--mono); font-size: 10px; color: var(--muted); }

  /* Data rows */
  .data-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .data-row:last-child { border-bottom: none; }
  .data-name { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .data-val { font-family: var(--mono); font-size: 12px; color: var(--text); }

  /* GPS Map */
  .map-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; position: relative; overflow: hidden; }
  .map-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px); background-size: 20px 20px; }
  .map-dot { position: absolute; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); z-index: 3; animation: map-pulse 2s ease-in-out infinite; }
  @keyframes map-pulse { 0%,100%{box-shadow: 0 0 12px var(--accent)} 50%{box-shadow: 0 0 24px var(--accent)} }
  .map-coords-tag { z-index: 4; background: var(--surface); border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px; font-family: var(--mono); font-size: 10px; color: var(--text); }

  /* GPS trace dots */
  .trace-dot { position: absolute; width: 4px; height: 4px; border-radius: 50%; background: var(--accent); opacity: 0.3; z-index: 2; }

  /* Source badge */
  .source-badge { font-family: var(--mono); font-size: 10px; text-align: center; padding: 8px; border-radius: 8px; border: 1px solid var(--border); }
  .source-badge.live { color: var(--accent); border-color: rgba(0,212,255,0.2); background: rgba(0,212,255,0.04); }
  .source-badge.sim { color: var(--warn); border-color: rgba(255,165,2,0.2); background: rgba(255,165,2,0.04); }
</style>
</head>
<body>
<header>
  <a href="/" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
    Back
  </a>
  <div class="logo">ZOE <span>Cruise</span></div>
  <div class="mode-pill"><div class="pulse"></div> Riding</div>
</header>

<main>

  <!-- Crash alert banner (hidden by default) -->
  <div class="crash-banner" id="crashBanner">
    <div class="crash-banner-text">Crash detected</div>
    <div class="crash-banner-time" id="crashTime">—</div>
  </div>

  <!-- Speed + Bike stats -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Live data</span>
      <div class="live-tag"><div class="live-dot"></div> Live</div>
    </div>
    <div class="card-body">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Speed</div>
          <div class="stat-value accent" id="valSpeed">—</div>
          <div class="stat-unit">km/h</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Event</div>
          <div class="stat-value" id="valEvent" style="font-size:16px;padding-top:6px">—</div>
          <div class="stat-unit" id="valBikeId">bike —</div>
        </div>
      </div>
    </div>
  </div>

  <!-- GPS -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">GPS Location</span>
      <div class="live-tag"><div class="live-dot"></div> Live</div>
    </div>
    <div class="card-body">
      <div class="map-box" id="mapBox">
        <div class="map-grid"></div>
        <div class="map-dot" id="mapDot"></div>
        <div class="map-coords-tag" id="gpsCoords">Acquiring signal...</div>
      </div>
      <div style="margin-top:14px">
        <div class="data-row"><span class="data-name">Latitude</span><span class="data-val" id="gpsLat">—</span></div>
        <div class="data-row"><span class="data-name">Longitude</span><span class="data-val" id="gpsLon">—</span></div>
        <div class="data-row"><span class="data-name">Last update</span><span class="data-val" id="lastUpdate">—</span></div>
        <div class="data-row"><span class="data-name">Device ID</span><span class="data-val" id="deviceId">—</span></div>
      </div>
    </div>
  </div>

  <div class="source-badge sim" id="sourceBadge">Simulated data — device not connected</div>

</main>

<script>
  let gpsHistory = [];

  async function fetchLatest() {
    try {
      const res = await fetch('/api/latest');
      const d = await res.json();
      updateUI(d);
    } catch(e) {}
  }

  async function fetchHistory() {
    try {
      const res = await fetch('/api/history');
      const data = await res.json();
      gpsHistory = data.filter(d => d.has_gps).slice(0, 10);
      renderTrace();
    } catch(e) {}
  }

  function updateUI(d) {
    // Speed
    const speed = d.speed !== null && d.speed !== undefined ? d.speed : '—';
    document.getElementById('valSpeed').textContent = speed;

    // Event type
    const eventEl = document.getElementById('valEvent');
    const event = d.event_type || '—';
    eventEl.textContent = event;
    if (event === 'crash_alert') {
      eventEl.className = 'stat-value danger';
      document.getElementById('crashBanner').classList.add('visible');
      document.getElementById('crashTime').textContent = d.timestamp || '—';
    } else if (event === 'theft_alert') {
      eventEl.className = 'stat-value warn';
    } else {
      eventEl.className = 'stat-value accent';
    }

    // Bike ID
    document.getElementById('valBikeId').textContent = `bike ${d.bike_id || '—'}`;

    // GPS
    if (d.has_gps && d.lat && d.lon) {
      document.getElementById('gpsLat').textContent = parseFloat(d.lat).toFixed(6);
      document.getElementById('gpsLon').textContent = parseFloat(d.lon).toFixed(6);
      document.getElementById('gpsCoords').textContent = `${parseFloat(d.lat).toFixed(4)}, ${parseFloat(d.lon).toFixed(4)}`;
    } else {
      document.getElementById('gpsCoords').textContent = 'No GPS fix';
    }

    // Timestamp
    const now = new Date();
    document.getElementById('lastUpdate').textContent =
      now.getHours().toString().padStart(2,'0') + ':' +
      now.getMinutes().toString().padStart(2,'0') + ':' +
      now.getSeconds().toString().padStart(2,'0');

    document.getElementById('deviceId').textContent = d.device_id || '—';

    // Source badge
    const badge = document.getElementById('sourceBadge');
    if (d.simulated) {
      badge.textContent = 'Simulated data — device not connected';
      badge.className = 'source-badge sim';
    } else {
      badge.textContent = 'Live data from CosmosDB';
      badge.className = 'source-badge live';
    }
  }

  function renderTrace() {
    // Remove old trace dots
    document.querySelectorAll('.trace-dot').forEach(d => d.remove());
    const box = document.getElementById('mapBox');
    const w = box.offsetWidth, h = box.offsetHeight;

    if (gpsHistory.length < 2) return;

    const lats = gpsHistory.map(d => d.lat).filter(Boolean);
    const lons = gpsHistory.map(d => d.lon).filter(Boolean);
    if (!lats.length) return;

    const minLat = Math.min(...lats), maxLat = Math.max(...lats);
    const minLon = Math.min(...lons), maxLon = Math.max(...lons);
    const rangeLat = maxLat - minLat || 0.001;
    const rangeLon = maxLon - minLon || 0.001;

    gpsHistory.forEach((d, i) => {
      if (!d.lat || !d.lon) return;
      const x = ((d.lon - minLon) / rangeLon) * (w - 40) + 20;
      const y = (1 - (d.lat - minLat) / rangeLat) * (h - 40) + 20;
      const dot = document.createElement('div');
      dot.className = 'trace-dot';
      dot.style.left = x + 'px';
      dot.style.top = y + 'px';
      dot.style.opacity = 0.15 + (i / gpsHistory.length) * 0.5;
      box.appendChild(dot);
    });

    // Move main dot to latest position
    const latest = gpsHistory[gpsHistory.length - 1];
    if (latest?.lat && latest?.lon) {
      const x = ((latest.lon - minLon) / rangeLon) * (w - 40) + 20;
      const y = (1 - (latest.lat - minLat) / rangeLat) * (h - 40) + 20;
      const dot = document.getElementById('mapDot');
      dot.style.left = x + 'px';
      dot.style.top = y + 'px';
    }
  }

  fetchLatest(); fetchHistory();
  setInterval(fetchLatest, 3000);
  setInterval(fetchHistory, 10000);
</script>
</body>
</html>
