<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOE — Navigation</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0c10; --surface: #111318; --surface2: #181c24;
    --border: rgba(255,255,255,0.07); --text: #e8eaf0; --muted: #5a6070;
    --accent: #00d4ff; --accent2: #7b61ff; --danger: #ff4757; --warn: #ffa502;
    --mono: 'JetBrains Mono', monospace; --sans: 'Space Grotesk', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; max-width: 460px; margin: 0 auto; display: flex; flex-direction: column; position: relative; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }

  header { padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; background: rgba(10,12,16,0.95); backdrop-filter: blur(12px); }
  .logo { font-family: var(--mono); font-size: 12px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; }
  .logo span { color: var(--accent); }
  .back-btn { font-family: var(--mono); font-size: 11px; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.15s; }
  .back-btn:hover { color: var(--accent); }
  .back-btn svg { width: 14px; height: 14px; }
  .mode-pill { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(0,212,255,0.3); color: var(--accent); background: rgba(0,212,255,0.06); display: flex; align-items: center; gap: 6px; }
  .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  main { flex: 1; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; position: relative; z-index: 10; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
  .card-body { padding: 18px; }
  .live-tag { font-family: var(--mono); font-size: 9px; color: var(--accent); display: flex; align-items: center; gap: 5px; letter-spacing: 1px; }
  .live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: pulse 1s ease-in-out infinite; }

  /* Accel grid */
  .accel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .axis-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 10px; text-align: center; }
  .axis-label { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; }
  .axis-value { font-family: var(--mono); font-size: 24px; font-weight: 500; line-height: 1; transition: color 0.3s; }
  .axis-value.normal { color: var(--text); }
  .axis-value.warn { color: var(--warn); }
  .axis-value.danger { color: var(--danger); }
  .axis-unit { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-top: 4px; }

  /* Bar chart */
  .bar-wrap { display: flex; align-items: flex-end; gap: 3px; height: 64px; margin-top: 14px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .bar { width: 100%; border-radius: 2px 2px 0 0; transition: height 0.4s ease; min-height: 2px; }
  .bar.x { background: var(--accent); opacity: 0.8; }
  .bar.y { background: var(--accent2); opacity: 0.8; }
  .bar.z { background: #00ff88; opacity: 0.6; }
  .bar-tick { font-family: var(--mono); font-size: 8px; color: var(--muted); }
  .bar-legend { display: flex; gap: 16px; margin-top: 10px; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 1px; }
  .legend-dot { width: 8px; height: 3px; border-radius: 2px; }

  /* Data rows */
  .data-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .data-row:last-child { border-bottom: none; }
  .data-name { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .data-val { font-family: var(--mono); font-size: 12px; color: var(--text); }

  /* GPS Map */
  .map-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; position: relative; overflow: hidden; }
  .map-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px); background-size: 20px 20px; }
  .map-crosshair { z-index: 2; width: 20px; height: 20px; position: relative; }
  .map-crosshair::before, .map-crosshair::after { content: ''; position: absolute; background: var(--accent); }
  .map-crosshair::before { width: 1px; height: 100%; left: 50%; top: 0; }
  .map-crosshair::after { width: 100%; height: 1px; top: 50%; left: 0; }
  .map-dot { position: absolute; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); z-index: 3; animation: map-pulse 2s ease-in-out infinite; }
  @keyframes map-pulse { 0%,100%{box-shadow: 0 0 12px var(--accent)} 50%{box-shadow: 0 0 24px var(--accent)} }
  .map-coords-tag { z-index: 4; background: var(--surface); border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px; font-family: var(--mono); font-size: 10px; color: var(--text); }

  /* Source badge */
  .source-badge { font-family: var(--mono); font-size: 10px; text-align: center; padding: 8px; border-radius: 8px; border: 1px solid var(--border); }
  .source-badge.live { color: var(--accent); border-color: rgba(0,212,255,0.2); background: rgba(0,212,255,0.04); }
  .source-badge.sim { color: var(--warn); border-color: rgba(255,165,2,0.2); background: rgba(255,165,2,0.04); }
</style>
</head>
<body>
<header>
  <a href="/" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
    Back
  </a>
  <div class="logo">ZOE <span>Nav</span></div>
  <div class="mode-pill"><div class="pulse"></div> Riding</div>
</header>

<main>

  <!-- Accelerometer -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Accelerometer</span>
      <div class="live-tag"><div class="live-dot"></div> Live</div>
    </div>
    <div class="card-body">
      <div class="accel-grid">
        <div class="axis-card">
          <div class="axis-label">X — AXIS</div>
          <div class="axis-value normal" id="valX">—</div>
          <div class="axis-unit">m/s²</div>
        </div>
        <div class="axis-card">
          <div class="axis-label">Y — AXIS</div>
          <div class="axis-value normal" id="valY">—</div>
          <div class="axis-unit">m/s²</div>
        </div>
        <div class="axis-card">
          <div class="axis-label">Z — AXIS</div>
          <div class="axis-value normal" id="valZ">—</div>
          <div class="axis-unit">m/s²</div>
        </div>
      </div>
      <div class="bar-wrap" id="barWrap"></div>
      <div class="bar-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> X</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent2)"></div> Y</div>
        <div class="legend-item"><div class="legend-dot" style="background:#00ff88"></div> Z</div>
      </div>
    </div>
  </div>

  <!-- GPS -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">GPS Location</span>
      <div class="live-tag"><div class="live-dot"></div> Live</div>
    </div>
    <div class="card-body">
      <div class="map-box">
        <div class="map-grid"></div>
        <div class="map-dot"></div>
        <div class="map-coords-tag" id="gpsCoords">Acquiring signal...</div>
      </div>
      <div style="margin-top:14px">
        <div class="data-row"><span class="data-name">Latitude</span><span class="data-val" id="gpsLat">—</span></div>
        <div class="data-row"><span class="data-name">Longitude</span><span class="data-val" id="gpsLon">—</span></div>
        <div class="data-row"><span class="data-name">Last update</span><span class="data-val" id="lastUpdate">—</span></div>
        <div class="data-row"><span class="data-name">Device ID</span><span class="data-val" id="deviceId">—</span></div>
      </div>
    </div>
  </div>

  <div class="source-badge sim" id="sourceBadge">Simulated data — device not connected</div>

</main>

<script>
  const ALERT_THRESH = 1.5, DANGER_THRESH = 3.0;
  let history = [], MAX_BARS = 14;

  async function fetchLatest() {
    try {
      const res = await fetch('/api/latest');
      const d = await res.json();
      updateUI(d);
    } catch(e) {}
  }

  async function fetchHistory() {
    try {
      const res = await fetch('/api/history');
      const data = await res.json();
      history = data.slice(0, MAX_BARS).reverse();
      renderBars();
    } catch(e) {}
  }

  function updateUI(d) {
    const x = parseFloat(d.x) || 0;
    const y = parseFloat(d.y) || 0;
    const z = parseFloat(d.z) || 9.81;

    document.getElementById('valX').textContent = x.toFixed(2);
    document.getElementById('valY').textContent = y.toFixed(2);
    document.getElementById('valZ').textContent = z.toFixed(2);

    ['X','Y'].forEach(axis => {
      const el = document.getElementById('val'+axis);
      const v = Math.abs(axis === 'X' ? x : y);
      el.className = 'axis-value ' + (v > DANGER_THRESH ? 'danger' : v > ALERT_THRESH ? 'warn' : 'normal');
    });

    const now = new Date();
    document.getElementById('lastUpdate').textContent =
      now.getHours().toString().padStart(2,'0') + ':' +
      now.getMinutes().toString().padStart(2,'0') + ':' +
      now.getSeconds().toString().padStart(2,'0');

    document.getElementById('deviceId').textContent = d.device_id || 'pysense-01';

    const badge = document.getElementById('sourceBadge');
    if (d.simulated) {
      badge.textContent = 'Simulated data — device not connected';
      badge.className = 'source-badge sim';
    } else {
      badge.textContent = 'Live data from CosmosDB';
      badge.className = 'source-badge live';
    }
  }

  function renderBars() {
    const wrap = document.getElementById('barWrap');
    wrap.innerHTML = '';
    history.forEach((d, i) => {
      const col = document.createElement('div');
      col.className = 'bar-col';
      ['x','y','z'].forEach(axis => {
        const bar = document.createElement('div');
        bar.className = 'bar ' + axis;
        const pct = Math.min(Math.abs(parseFloat(d[axis]) || 0) / 5, 1);
        bar.style.height = Math.max(pct * 56, 2) + 'px';
        col.appendChild(bar);
      });
      if (i === history.length - 1) {
        const tick = document.createElement('div');
        tick.className = 'bar-tick'; tick.textContent = 'now';
        col.appendChild(tick);
      }
      wrap.appendChild(col);
    });
  }

  fetchLatest(); fetchHistory();
  setInterval(fetchLatest, 3000);
  setInterval(fetchHistory, 10000);
</script>
</body>
</html>
